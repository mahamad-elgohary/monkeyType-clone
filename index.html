<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>typing test</h1>
        
        <div class="typing-options">
            <button class="options-btn" data-option="symbols">symbols</button>
            <button class="options-btn" data-option="numbers">numbers</button>
        </div>        
        <div class="settings">
            <button class="time-btn " data-time="30">30</button>
            <button class="time-btn" data-time="60">60</button>
            <button class="time-btn" data-time="120">120</button>
        </div>
    </header>

    <section class="stats">

        <div class="card">
            <span class="label">time</span>
            <span id="time"></span>
        </div>

        <div class="card">
            <span class="label">wpm</span>
            <span id="wpm">0</span>
        </div>

        <div class="card">
            <span class="label">cpm</span>
            <span id="cpm">0</span>
        </div>

        <div class="card">
            <span class="label">accuracy</span>
            <span id="accuracy">100%</span>
        </div>

        <div class="card">
            <span class="label">errors</span>
            <span id="errors">0</span>
        </div>

    </section>

  
   <section class="typing-wrapper">

    <div class="text-container">
        <p id="paragraph">Loading text...</p>
    </div>

    <textarea
        id="typingInput"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"></textarea>

</section>

    <section class="controls">
        <button id="restartBtn">restart</button>
        <button id="newTextBtn">new text</button>
    </section>

    <section class="results">

        <div class="result-box">
            <h3>best wpm</h3>
            <p id="bestWpm"></p>
        </div>

        <div class="result-box">
            <h3>tests completed</h3>
            <p id="testsCompleted"></p>
        </div>

    </section>

</div>

<script type="module" src="./script.js"></script>

</body>
</html>
